<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d94c8a" />
  <title>مغامرة مسك والدب</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="home-btn" data-screen="home" aria-label="الغلاف">🌸</button>
    <h1>مغامرة مسك والدب</h1>
    <nav>
      <button class="tab active" data-screen="home">الغلاف</button>
      <button class="tab" data-screen="story">القصة</button>
      <button class="tab" data-screen="coloring">التلوين</button>
    </nav>
  </header>

  <main>
    <section id="home" class="screen active cover-screen">
      <img class="cover-full" src="assets/cover.png" alt="غلاف مغامرة مسك والدب">
      <div class="cover-actions">
        <button class="primary big" id="startBtn">▶️ ابدأ المغامرة</button>
        <button class="secondary big" data-screen="coloring">🎨 صفحات التلوين</button>
      </div>
    </section>

    <section id="story" class="screen story-screen">
      <div class="progress"><span id="progressBar"></span></div>
      <div class="story-card">
        <div class="image-panel">
          <img id="pageImg" class="page-img" src="assets/page1.png" alt="صفحة القصة">
        </div>
        <article class="text-panel">
          <div class="page-badge" id="pageBadge">الصفحة 1 من 5</div>
          <h2 id="pageTitle"></h2>
          <p id="pageText"></p>
          <div id="gameBox" class="game-box" hidden></div>
          <div class="stars" id="stars">☆ ☆ ☆ ☆ ☆</div>
          <div class="story-actions">
            <button class="secondary" id="prevBtn">السابق</button>
            <button class="primary" id="readBtn">🔊 استمع</button>
            <button class="primary" id="nextBtn">التالي</button>
          </div>
        </article>
      </div>
    </section>

    <section id="coloring" class="screen coloring-screen">
      <div class="coloring-shell">
        <aside class="tools">
          <h2>🎨 صفحات التلوين</h2>
          <p>اختاري الصفحة ثم لوني بإصبعك أو بالماوس. الصفحات محسّنة بخطوط سوداء واضحة.</p>
          <div class="page-select" id="colorPages"></div>
          <div class="colors" id="colors"></div>
          <label class="range-label">حجم الفرشاة
            <input id="brush" type="range" min="3" max="55" value="16">
          </label>
          <div class="tool-actions">
            <button class="secondary" id="eraserBtn">ممحاة</button>
            <button class="secondary" id="clearBtn">مسح</button>
            <button class="primary" id="saveBtn">حفظ</button>
          </div>
        </aside>
        <div class="canvas-wrap"><canvas id="paintCanvas"></canvas></div>
      </div>
    </section>
  </main>
</div>
<script src="script.js"></script>
</body>
</html>
